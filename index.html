<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn → Consultant Landing Page</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }

  /* ── Pitch / Input Screen ── */
  .pitch {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px; text-align: center;
    background: radial-gradient(ellipse at 50% 0%, #1a1a3e 0%, #0a0a1a 70%);
  }
  .pitch h1 { font-size: 3rem; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 12px; line-height: 1.1; }
  .pitch h1 span { background: linear-gradient(135deg, #e63946, #ff6b81, #ffd93d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .pitch p { font-size: 1.15rem; color: rgba(255,255,255,0.55); max-width: 560px; margin-bottom: 36px; line-height: 1.6; }
  .url-box { display: flex; gap: 0; max-width: 580px; width: 100%; }
  .url-box input {
    flex: 1; padding: 16px 20px; font-size: 1rem; border: 2px solid rgba(255,255,255,0.15);
    border-right: none; border-radius: 12px 0 0 12px; background: rgba(255,255,255,0.06);
    color: white; outline: none; font-family: inherit; transition: border 0.3s;
  }
  .url-box input::placeholder { color: rgba(255,255,255,0.3); }
  .url-box input:focus { border-color: #e63946; }
  .url-box button {
    padding: 16px 32px; font-size: 1rem; font-weight: 700; border: none; border-radius: 0 12px 12px 0;
    background: linear-gradient(135deg, #e63946, #ff6b81); color: white; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s; white-space: nowrap;
  }
  .url-box button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(230,57,70,0.4); }
  .examples { margin-top: 20px; font-size: 0.85rem; color: rgba(255,255,255,0.35); }
  .examples a { color: rgba(255,255,255,0.5); cursor: pointer; text-decoration: underline; transition: color 0.2s; }
  .examples a:hover { color: #e63946; }

  /* ── Loading ── */
  .loading { display: none; flex-direction: column; align-items: center; gap: 16px; margin-top: 30px; }
  .loading.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #e63946; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 0.9rem; color: rgba(255,255,255,0.5); }

  /* ── Result Screen ── */
  .result { display: none; }
  .result.show { display: block; }
  .result-bar {
    background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .result-bar .profile-name { font-weight: 700; font-size: 0.95rem; margin-right: auto; }
  .result-bar .linkedin-link { font-size: 0.8rem; color: rgba(255,255,255,0.4); text-decoration: none; }
  .result-bar .linkedin-link:hover { color: #e63946; }
  .bar-btn {
    padding: 7px 16px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.15);
    background: transparent; color: white; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .bar-btn:hover { background: rgba(255,255,255,0.08); }
  .bar-btn.primary { background: #e63946; border-color: #e63946; }
  .bar-btn.primary:hover { background: #c0392b; }
  .template-tabs { display: flex; gap: 4px; }
  .template-tabs button {
    padding: 6px 14px; border-radius: 6px; border: none; background: transparent;
    color: rgba(255,255,255,0.4); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .template-tabs button.active { background: rgba(255,255,255,0.1); color: white; }
  .template-tabs button:hover { color: white; }
  #preview-frame { width: 100%; border: none; min-height: calc(100vh - 52px); background: white; }

  @media (max-width: 600px) {
    .pitch h1 { font-size: 2rem; }
    .pitch p { font-size: 1rem; }
    .url-box { flex-direction: column; }
    .url-box input { border-right: 2px solid rgba(255,255,255,0.15); border-radius: 12px 12px 0 0; }
    .url-box button { border-radius: 0 0 12px 12px; }
  }
</style>
</head>
<body>

<!-- ═══ PITCH SCREEN ═══ -->
<div class="pitch" id="pitch-screen">
  <h1>LinkedIn URL in.<br><span>Coaching page out.</span></h1>
  <p>Paste any LinkedIn profile and instantly generate a professional consultant landing page — with services, pricing, TidyCal booking, and testimonials.</p>
  <div class="url-box">
    <input type="text" id="linkedin-url" placeholder="https://linkedin.com/in/someone" autofocus>
    <button onclick="go()">Generate</button>
  </div>
  <div class="examples">
    Try it: <a onclick="tryExample('noah-kagan')">noah-kagan</a> · <a onclick="tryExample('marcuscoach')">marcuscoach</a> · <a onclick="tryExample('lisawells')">lisawells</a>
  </div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Building your coaching page...</p>
  </div>
</div>

<!-- ═══ RESULT SCREEN ═══ -->
<div class="result" id="result-screen">
  <div class="result-bar">
    <span class="profile-name" id="result-name"></span>
    <a class="linkedin-link" id="result-link" href="#" target="_blank">View on LinkedIn</a>
    <div class="template-tabs">
      <button class="active" onclick="switchTemplate('minimal', this)">Minimal</button>
      <button onclick="switchTemplate('split', this)">Split</button>
      <button onclick="switchTemplate('card', this)">Card</button>
    </div>
    <button class="bar-btn" onclick="startOver()">New URL</button>
  </div>
  <iframe id="preview-frame" title="Landing page preview"></iframe>
</div>

// ═══════════════════════════════════════════
// CORE LOGIC
// ═══════════════════════════════════════════
let currentProfile = null;
let currentTemplate = 'minimal';

function extractSlug(input) {
  input = input.trim().replace(/\/+$/, '');
  const match = input.match(/linkedin\.com\/in\/([a-zA-Z0-9_-]+)/);
  if (match) return match[1].toLowerCase();
  if (/^[a-zA-Z0-9_-]+$/.test(input)) return input.toLowerCase();
  return null;
}

function tryExample(slug) {
  document.getElementById('linkedin-url').value = 'https://linkedin.com/in/' + slug;
  go();
}

function go() {
  const input = document.getElementById('linkedin-url').value;
  const slug = extractSlug(input);
  if (!slug) {
    document.getElementById('linkedin-url').style.borderColor = '#e63946';
    setTimeout(() => document.getElementById('linkedin-url').style.borderColor = '', 1500);
    return;
  }
  document.getElementById('loading').classList.add('show');
  setTimeout(() => {
    currentProfile = profiles[slug] || generateFromSlug(slug);
    currentTemplate = 'minimal';
    showResult();
  }, 1200);
}

function generateFromSlug(slug) {
  const name = slug.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  const niches = ["Business Growth", "Executive Leadership", "Marketing Strategy", "Product Management", "Career Transition", "Sales Performance", "Operations", "AI & Automation"];
  const pick = (arr, salt) => arr[Math.abs(hashStr(slug + (salt||''))) % arr.length];
  const niche = pick(niches, '');
  return {
    fullName: name,
    headline: `${niche} Coach & Consultant`,
    photoUrl: "",
    location: pick(["San Francisco, CA", "New York, NY", "Austin, TX", "London, UK", "Miami, FL"], 'loc'),
    bio: `Experienced ${niche.toLowerCase()} consultant helping ambitious professionals and companies achieve breakthrough results.\n\nWith 10+ years of hands-on experience, I combine strategic frameworks with practical execution to help my clients move faster and smarter.\n\nI've worked with 50+ clients across startups and Fortune 500s. Let's build something great together.`,
    tagline: `Unlock your ${niche.toLowerCase()} potential.`,
    services: [
      { name: "Strategy Session", desc: `Deep dive into your ${niche.toLowerCase()} challenges. Walk away with a clear action plan.`, price: "$300", duration: "60 min", tidycal: slug + "/strategy", featured: true },
      { name: "Monthly Coaching", desc: "4 sessions/month with async support. Ongoing accountability and strategic guidance.", price: "$2,000/mo", duration: "Ongoing", tidycal: slug + "/monthly" },
      { name: "Quick Consultation", desc: "30-min focused call for a specific question or challenge.", price: "$100", duration: "30 min", tidycal: slug + "/quick" }
    ],
    testimonials: [
      { name: "Alex M.", role: "Startup Founder", text: "Transformed how I think about my business. Highly recommended.", stars: 5 },
      { name: "Jordan K.", role: "VP of Ops", text: "Practical, actionable advice. Not just theory. Worth every dollar.", stars: 5 }
    ],
    stats: [
      { value: "50+", label: "Clients Served" },
      { value: "10yr", label: "Experience" },
      { value: "4.9", label: "Avg Rating" }
    ],
    credentials: ["Certified Coach", "10+ Years Experience", "50+ Clients"],
    skills: niche + ", Strategy, Leadership, Communication, Team Building, Problem Solving",
    linkedinUrl: "https://linkedin.com/in/" + slug,
    websiteUrl: "",
    twitterUrl: "",
    githubUrl: "",
    email: slug.replace(/[-_]/g, '') + "@consulting.com",
    tidycalBase: "https://tidycal.com/" + slug
  };
}

function hashStr(s) { let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h); return h; }

function showResult() {
  document.getElementById('loading').classList.remove('show');
  document.getElementById('pitch-screen').style.display = 'none';
  document.getElementById('result-screen').classList.add('show');
  document.getElementById('result-name').textContent = currentProfile.fullName;
  document.getElementById('result-link').href = currentProfile.linkedinUrl;
  document.querySelectorAll('.template-tabs button').forEach((b, i) => b.classList.toggle('active', i === 0));
  renderPreview();
}

function switchTemplate(name, btn) {
  currentTemplate = name;
  document.querySelectorAll('.template-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPreview();
}

function startOver() {
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('pitch-screen').style.display = '';
  document.getElementById('linkedin-url').value = '';
  document.getElementById('linkedin-url').focus();
}

function renderPreview() {
  const html = generatePage(currentProfile, currentTemplate);
  const frame = document.getElementById('preview-frame');
  frame.srcdoc = html;
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function e(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function bioHtml(t) { return e(t).replace(/\n\n/g,'</p><p style="margin-top:14px;">').replace(/\n/g,'<br>'); }
function stars(n) { return '<span style="color:#fbbf24;letter-spacing:2px;">' + '&#9733;'.repeat(n) + '</span>'; }

function avatar(name, size) {
  const parts=(name||'U').split(' ');
  const initials=(parts[0][0]+(parts.length>1?parts[parts.length-1][0]:'')).toUpperCase();
  let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h);
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" rx="${size/2}" fill="hsl(${Math.abs(h)%360},55%,45%)"/><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="system-ui,sans-serif" font-size="${size*0.38}" font-weight="700" fill="white">${initials}</text></svg>`)}`;
}

function photoHtml(p,size) {
  return `<img src="${e(p.photoUrl||avatar(p.fullName,size))}" alt="${e(p.fullName)}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;">`;
}

function linksArr(p) {
  const a=[];
  if(p.linkedinUrl) a.push({u:p.linkedinUrl,i:ico.li,l:'LinkedIn'});
  if(p.websiteUrl) a.push({u:p.websiteUrl,i:ico.web,l:'Website'});
  if(p.twitterUrl) a.push({u:p.twitterUrl,i:ico.tw,l:'Twitter'});
  if(p.githubUrl) a.push({u:p.githubUrl,i:ico.gh,l:'GitHub'});
  if(p.email) a.push({u:'mailto:'+p.email,i:ico.mail,l:'Email'});
  return a;
}

// PAGE GENERATORS

function generatePage(p, tpl) {
  if (tpl === 'split') return pageSplit(p);
  if (tpl === 'card') return pageCard(p);
  return pageMinimal(p);
}

// ── Shared section renderers ──
function renderServices(p, accent, accentLight) {
  if (!p.services?.length) return '';
  return `<div class="services">${p.services.map(s => `
    <div class="svc ${s.featured ? 'featured' : ''}">
      ${s.featured ? '<div class="svc-badge">Most Popular</div>' : ''}
      <h3>${e(s.name)}</h3>
      <div class="svc-price">${e(s.price)}</div>
      <div class="svc-dur">${e(s.duration)}</div>
      <p>${e(s.desc)}</p>
      <a href="https://tidycal.com/${e(s.tidycal)}" target="_blank" class="svc-btn ${s.featured ? 'svc-btn-primary' : ''}">Book Now</a>
    </div>`).join('')}</div>`;
}

function renderTestimonials(p) {
  if (!p.testimonials?.length) return '';
  return `<div class="tgrid">${p.testimonials.map(t => `
    <div class="tcard">
      <div style="margin-bottom:10px">${stars(t.stars)}</div>
      <p class="ttext">"${e(t.text)}"</p>
      <div class="tauthor"><strong>${e(t.name)}</strong><span>${e(t.role)}</span></div>
    </div>`).join('')}</div>`;
}

function renderStats(p) {
  if (!p.stats?.length) return '';
  return `<div class="stats">${p.stats.map(s => `
    <div class="stat"><div class="stat-val">${e(s.value)}</div><div class="stat-lbl">${e(s.label)}</div></div>`).join('')}</div>`;
}

function renderCredentials(p) {
  if (!p.credentials?.length) return '';
  return `<div class="creds">${p.credentials.map(c => `<span class="cred">${ico.check} ${e(c)}</span>`).join('')}</div>`;
}

.stat-lbl{font-size:0.72rem;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.creds{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.cred{display:inline-flex;align-items:center;gap:4px;background:#f0e8fd;color:#6d28d9;padding:5px 12px;border-radius:16px;font-size:0.78rem;font-weight:600}
.services{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.svc{background:#faf8ff;border-radius:14px;padding:24px;border:2px solid transparent;transition:all 0.2s;position:relative}
.svc:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.svc.featured{border-color:#8b5cf6;background:#fff}
.svc-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:#8b5cf6;color:#fff;padding:3px 14px;border-radius:12px;font-size:0.72rem;font-weight:700;white-space:nowrap}
.svc h3{font-size:1rem;font-weight:700}
.svc-price{font-size:1.4rem;font-weight:900;color:#8b5cf6;margin:6px 0 2px}
.svc-dur{font-size:0.78rem;color:#bbb;margin-bottom:10px}
.svc p{font-size:0.85rem;color:#666;margin-bottom:14px}
.svc-btn{display:block;text-align:center;padding:10px;border-radius:8px;font-size:0.88rem;font-weight:700;text-decoration:none;border:2px solid #8b5cf6;color:#8b5cf6;transition:all 0.2s}
.svc-btn:hover{background:#8b5cf6;color:#fff}
.svc-btn-primary{background:#8b5cf6;color:#fff}
.svc-btn-primary:hover{background:#7c3aed}
.tgrid{display:grid;grid-template-columns:1fr;gap:14px}
.tcard{background:#faf8ff;border-radius:12px;padding:22px}
.ttext{font-size:0.9rem;color:#555;font-style:italic;margin-bottom:12px;line-height:1.6}
.tauthor strong{display:block;font-size:0.85rem}
.tauthor span{font-size:0.75rem;color:#aaa}
.skills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.sk{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:7px 18px;border-radius:20px;font-size:0.8rem;font-weight:600}
.cta-card{text-align:center}
.cta-card h2::after{left:50%;transform:translateX(-50%)}
.cta-card p{color:#666;margin-bottom:20px}
@media(max-width:600px){body{padding:24px 12px}.pc,.cd{padding:28px 22px}.pc h1{font-size:1.5rem}.services{grid-template-columns:1fr}}
</style></head><body>
<div class="w">
  <div class="pc">
    ${photoHtml(p,130)}
    <h1>${e(p.fullName)}</h1>
    <div class="hl">${e(p.headline)}</div>
    ${p.location?`<div class="loc">${ico.pin} ${e(p.location)}</div>`:''}
    ${p.tagline?`<div class="tagline">${e(p.tagline)}</div>`:''}
    ${featuredService?`<a href="https://tidycal.com/${e(featuredService.tidycal)}" target="_blank" class="pc-cta">${ico.cal} Book a Call</a>`:''}
    ${links.length?`<div class="soc">${links.map(l=>`<a href="${e(l.u)}" target="_blank" title="${l.l}">${l.i}</a>`).join('')}</div>`:''}
  </div>
  ${p.stats?.length?`<div class="cd center"><div class="stats">${p.stats.map(s=>`<div class="stat"><div class="stat-val">${e(s.value)}</div><div class="stat-lbl">${e(s.label)}</div></div>`).join('')}</div>${p.credentials?renderCredentials(p):''}</div>`:''}
  ${p.bio?`<div class="cd about"><h2>About Me</h2><p>${bioHtml(p.bio)}</p></div>`:''}
  <div class="cd"><h2>Work With Me</h2>${renderServices(p,'#8b5cf6','#f0e8fd')}</div>
  ${p.testimonials?.length?`<div class="cd"><h2>What Clients Say</h2>${renderTestimonials(p)}</div>`:''}
  ${skills.length?`<div class="cd center"><h2>Expertise</h2><div class="skills">${skills.map(s=>`<span class="sk">${e(s)}</span>`).join('')}</div></div>`:''}
  <div class="cd cta-card">
    <h2>Ready to Get Started?</h2>
    <p>Book a call and let's figure out the fastest path to your goals.</p>
    ${featuredService?`<a href="https://tidycal.com/${e(featuredService.tidycal)}" target="_blank" class="pc-cta">${ico.cal} Book Your Session</a>`:''}
  </div>
</div>
</body></html>`;
