<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn → Landing Page</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }

  /* ── Pitch / Input Screen ── */
  .pitch {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px; text-align: center;
    background: radial-gradient(ellipse at 50% 0%, #1a1a3e 0%, #0a0a1a 70%);
  }
  .pitch h1 { font-size: 3rem; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 12px; line-height: 1.1; }
  .pitch h1 span { background: linear-gradient(135deg, #e63946, #ff6b81, #ffd93d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .pitch p { font-size: 1.15rem; color: rgba(255,255,255,0.55); max-width: 520px; margin-bottom: 36px; line-height: 1.6; }
  .url-box { display: flex; gap: 0; max-width: 580px; width: 100%; }
  .url-box input {
    flex: 1; padding: 16px 20px; font-size: 1rem; border: 2px solid rgba(255,255,255,0.15);
    border-right: none; border-radius: 12px 0 0 12px; background: rgba(255,255,255,0.06);
    color: white; outline: none; font-family: inherit; transition: border 0.3s;
  }
  .url-box input::placeholder { color: rgba(255,255,255,0.3); }
  .url-box input:focus { border-color: #e63946; }
  .url-box button {
    padding: 16px 32px; font-size: 1rem; font-weight: 700; border: none; border-radius: 0 12px 12px 0;
    background: linear-gradient(135deg, #e63946, #ff6b81); color: white; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s; white-space: nowrap;
  }
  .url-box button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(230,57,70,0.4); }
  .examples { margin-top: 20px; font-size: 0.85rem; color: rgba(255,255,255,0.35); }
  .examples a { color: rgba(255,255,255,0.5); cursor: pointer; text-decoration: underline; transition: color 0.2s; }
  .examples a:hover { color: #e63946; }

  /* ── Loading ── */
  .loading { display: none; flex-direction: column; align-items: center; gap: 16px; margin-top: 30px; }
  .loading.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #e63946; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 0.9rem; color: rgba(255,255,255,0.5); }

  /* ── Result Screen ── */
  .result { display: none; }
  .result.show { display: block; }
  .result-bar {
    background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .result-bar .profile-name { font-weight: 700; font-size: 0.95rem; margin-right: auto; }
  .result-bar .linkedin-link { font-size: 0.8rem; color: rgba(255,255,255,0.4); text-decoration: none; }
  .result-bar .linkedin-link:hover { color: #e63946; }
  .bar-btn {
    padding: 7px 16px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.15);
    background: transparent; color: white; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .bar-btn:hover { background: rgba(255,255,255,0.08); }
  .bar-btn.primary { background: #e63946; border-color: #e63946; }
  .bar-btn.primary:hover { background: #c0392b; }
  .template-tabs { display: flex; gap: 4px; }
  .template-tabs button {
    padding: 6px 14px; border-radius: 6px; border: none; background: transparent;
    color: rgba(255,255,255,0.4); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .template-tabs button.active { background: rgba(255,255,255,0.1); color: white; }
  .template-tabs button:hover { color: white; }
  #preview-frame { width: 100%; border: none; min-height: calc(100vh - 52px); background: white; }

  @media (max-width: 600px) {
    .pitch h1 { font-size: 2rem; }
    .pitch p { font-size: 1rem; }
    .url-box { flex-direction: column; }
    .url-box input { border-right: 2px solid rgba(255,255,255,0.15); border-radius: 12px 12px 0 0; }
    .url-box button { border-radius: 0 0 12px 12px; }
  }
</style>
</head>
<body>

<!-- ═══ PITCH SCREEN ═══ -->
<div class="pitch" id="pitch-screen">
  <h1>LinkedIn URL in.<br><span>Landing page out.</span></h1>
  <p>Paste any LinkedIn profile URL and instantly get a beautiful, ready-to-share personal landing page. No signup. No fuss.</p>
  <div class="url-box">
    <input type="text" id="linkedin-url" placeholder="https://linkedin.com/in/someone" autofocus>
    <button onclick="go()">Generate</button>
  </div>
  <div class="examples">
    Try it: <a onclick="tryExample('noah-kagan')">noah-kagan</a> · <a onclick="tryExample('alexchen')">alexchen</a> · <a onclick="tryExample('sarahj')">sarahj</a>
  </div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Fetching profile & generating page...</p>
  </div>
</div>

<!-- ═══ RESULT SCREEN ═══ -->
<div class="result" id="result-screen">
  <div class="result-bar">
    <span class="profile-name" id="result-name"></span>
    <a class="linkedin-link" id="result-link" href="#" target="_blank">View on LinkedIn</a>
    <div class="template-tabs">
      <button class="active" onclick="switchTemplate('minimal', this)">Minimal</button>
      <button onclick="switchTemplate('split', this)">Split</button>
      <button onclick="switchTemplate('card', this)">Card</button>
    </div>
    <button class="bar-btn" onclick="startOver()">New URL</button>
  </div>
  <iframe id="preview-frame" title="Landing page preview"></iframe>
</div>

// ═══════════════════════════════════════════
// CORE LOGIC
// ═══════════════════════════════════════════
let currentProfile = null;
let currentTemplate = 'minimal';

function extractSlug(input) {
  input = input.trim().replace(/\/+$/, '');
  // Full URL
  const match = input.match(/linkedin\.com\/in\/([a-zA-Z0-9_-]+)/);
  if (match) return match[1].toLowerCase();
  // Just a slug
  if (/^[a-zA-Z0-9_-]+$/.test(input)) return input.toLowerCase();
  return null;
}

function tryExample(slug) {
  document.getElementById('linkedin-url').value = 'https://linkedin.com/in/' + slug;
  go();
}

function go() {
  const input = document.getElementById('linkedin-url').value;
  const slug = extractSlug(input);
  if (!slug) {
    document.getElementById('linkedin-url').style.borderColor = '#e63946';
    setTimeout(() => document.getElementById('linkedin-url').style.borderColor = '', 1500);
    return;
  }

  // Show loading
  document.getElementById('loading').classList.add('show');

  // Simulate API fetch delay
  setTimeout(() => {
    // Look up profile or generate a random one from the slug
    currentProfile = profiles[slug] || generateFromSlug(slug);
    currentTemplate = 'minimal';
    showResult();
  }, 1200);
}

function generateFromSlug(slug) {
  // Generate a plausible profile from any slug
  const name = slug.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  const titles = [
    "Senior Software Engineer", "Product Manager", "Head of Growth",
    "Staff Engineer", "Director of Marketing", "Founder & CEO",
    "Principal Designer", "VP of Operations"
  ];
  const companies = ["Stripe", "Notion", "Vercel", "Figma", "Shopify", "Airbnb", "Datadog", "Linear"];
  const pick = (arr) => arr[Math.abs(hashStr(slug)) % arr.length];
  const pick2 = (arr) => arr[Math.abs(hashStr(slug + '2')) % arr.length];
  const pick3 = (arr) => arr[Math.abs(hashStr(slug + '3')) % arr.length];

  return {
    fullName: name,
    headline: pick(titles) + " at " + pick(companies),
    photoUrl: "",
    location: ["San Francisco, CA", "New York, NY", "Austin, TX", "Seattle, WA", "London, UK"][Math.abs(hashStr(slug)) % 5],
    bio: `Experienced ${pick(titles).toLowerCase()} with a passion for building products that matter. Currently at ${pick(companies)}, previously worked at ${pick2(companies)} and ${pick3(companies)}.\n\nFocused on scaling systems and teams. Believer in shipping fast, learning faster, and always staying curious.`,
    experience: [
      { jobTitle: pick(titles), company: pick(companies), duration: "2022 – Present", description: "Leading key initiatives and driving product strategy across multiple teams." },
      { jobTitle: pick2(titles), company: pick2(companies), duration: "2019 – 2022", description: "Shipped critical features used by millions. Grew team from 5 to 20 engineers." },
      { jobTitle: "Software Engineer", company: pick3(companies), duration: "2016 – 2019", description: "Full-stack development. Built internal tools that improved team velocity by 3x." }
    ],
    skills: "Leadership, Strategy, Product Development, Engineering, Growth, Analytics, Team Building, Communication",
    linkedinUrl: "https://linkedin.com/in/" + slug,
    websiteUrl: "",
    twitterUrl: "",
    githubUrl: "",
    email: ""
  };
}

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
  return h;
}

function showResult() {
  document.getElementById('loading').classList.remove('show');
  document.getElementById('pitch-screen').style.display = 'none';
  document.getElementById('result-screen').classList.add('show');
  document.getElementById('result-name').textContent = currentProfile.fullName;
  document.getElementById('result-link').href = currentProfile.linkedinUrl;
  // Reset template tabs
  document.querySelectorAll('.template-tabs button').forEach((b, i) => b.classList.toggle('active', i === 0));
  renderPreview();
}

function switchTemplate(name, btn) {
  currentTemplate = name;
  document.querySelectorAll('.template-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPreview();
}

function startOver() {
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('pitch-screen').style.display = '';
  document.getElementById('linkedin-url').value = '';
  document.getElementById('linkedin-url').focus();
}

function renderPreview() {
  const html = generatePage(currentProfile, currentTemplate);
  const frame = document.getElementById('preview-frame');
  frame.srcdoc = html;
}

function avatar(name, size) {
  const parts = (name || 'U').split(' ');
  const initials = (parts[0][0] + (parts.length > 1 ? parts[parts.length - 1][0] : '')).toUpperCase();
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  const hue = Math.abs(h) % 360;
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" rx="${size/2}" fill="hsl(${hue},55%,45%)"/><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="system-ui,sans-serif" font-size="${size*0.38}" font-weight="700" fill="white">${initials}</text></svg>`)}`;
}

function photoHtml(p, size) {
  const src = p.photoUrl || avatar(p.fullName, size);
  return `<img src="${e(src)}" alt="${e(p.fullName)}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;">`;
}

function linksArr(p) {
  const a = [];
  if (p.linkedinUrl) a.push({ u: p.linkedinUrl, i: ico.li, l: 'LinkedIn' });
  if (p.websiteUrl) a.push({ u: p.websiteUrl, i: ico.web, l: 'Website' });
  if (p.twitterUrl) a.push({ u: p.twitterUrl, i: ico.tw, l: 'Twitter' });
  if (p.githubUrl) a.push({ u: p.githubUrl, i: ico.gh, l: 'GitHub' });
  if (p.email) a.push({ u: 'mailto:' + p.email, i: ico.mail, l: 'Email' });
  return a;
}

function bioHtml(text) {
  return e(text).replace(/\n\n/g, '</p><p style="margin-top:12px;">').replace(/\n/g, '<br>');
}
